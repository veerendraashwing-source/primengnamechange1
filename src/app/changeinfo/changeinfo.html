<div class="ci-layout">

  <!-- ── Main content ── -->
  <div class="ci-main">
    <router-outlet></router-outlet>
  </div>

  <!-- ── Right sidebar ── -->
  <aside class="ci-sidebar">

    <!-- Header -->
    <div class="ci-sidebar__header">

      <div class="ci-sidebar__title-row">
        <span class="ci-sidebar__title">Change Tools</span>
        <p-badge
          [value]="pages.length.toString()"
          severity="info"
          styleClass="ci-badge">
        </p-badge>
      </div>

      <p-autoComplete
        [(ngModel)]="searchQuery"
        [suggestions]="autoSuggestions"
        (completeMethod)="searchPages($event)"
        (onSelect)="onAutoSelect($event)"
        field="label"
        placeholder="Search Tools..."
        [minLength]="1"
        [forceSelection]="false"
        styleClass="ci-autocomplete"
        inputStyleClass="ci-autocomplete__input"
        appendTo="body">

        <ng-template let-page pTemplate="item">
          <div class="ci-autocomplete__item">
            <span class="ci-autocomplete__item-label">{{ page.label }}</span>
            <span class="ci-autocomplete__item-sub">{{ page.subModule }}</span>
          </div>
        </ng-template>

      </p-autoComplete>

    </div>

    <!-- Active page indicator -->
    <div class="ci-active-bar" *ngIf="activeLabel">
      <i class="pi pi-angle-right ci-active-bar__icon"></i>
      <span class="ci-active-bar__label">{{ activeLabel }}</span>
    </div>

    <p-divider styleClass="ci-divider"></p-divider>

    <!-- Nav groups -->
    <nav class="ci-nav">

      <div *ngIf="filteredPages.length === 0" class="ci-nav__empty">
        <i class="pi pi-search" style="font-size:1.2rem; opacity:0.3;"></i>
        <span>No pages found</span>
      </div>

      <div *ngFor="let group of subModuleGroups" class="ci-nav__group">

        <div class="ci-nav__group-label">
          <i class="pi pi-folder ci-nav__group-icon"></i>
          {{ group.name }}
          <p-badge
            [value]="group.items.length.toString()"
            styleClass="ci-group-badge">
          </p-badge>
        </div>

        <div
          *ngFor="let page of group.items"
          class="ci-nav__item"
          [class.ci-nav__item--active]="activeKey === page.key"
          pRipple
          [pTooltip]="page.label"
          tooltipPosition="left"
          (click)="navigate(page)">

          <i class="pi pi-chevron-right ci-nav__item-icon"></i>
          <span class="ci-nav__item-label">{{ page.label }}</span>

          <i
            *ngIf="activeKey === page.key"
            class="pi pi-check ci-nav__item-check">
          </i>

        </div>

      </div>
    </nav>

    <!-- Footer -->
    <div class="ci-sidebar__footer">
      <p-button
        label="Clear Active"
        icon="pi pi-times"
        severity="secondary"
        size="small"
        [text]="true"
        styleClass="ci-clear-btn"
        (onClick)="activeKey = ''">
      </p-button>
    </div>

  </aside>
</div>


<style>
  .ci-layout {
    display: flex;
    width: 100%;
    min-height: 100%;
    align-items: flex-start;
  }

  .ci-main {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }

  /* ── Sidebar ── */
  .ci-sidebar {
    width: 268px;
    min-width: 268px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #dee2e6;
    background: #fff;
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .ci-sidebar__header {
    padding: 0.9rem 1rem 0.75rem;
    border-bottom: 1px solid #dee2e6;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .ci-sidebar__title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ci-sidebar__title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6c757d;
  }

  :host ::ng-deep .ci-badge .p-badge {
    font-size: 10px;
    min-width: 1.3rem;
    height: 1.3rem;
    line-height: 1.3rem;
  }

  /* ── AutoComplete ── */
  :host ::ng-deep .ci-autocomplete {
    width: 100%;
  }

  :host ::ng-deep .ci-autocomplete .p-autocomplete {
    width: 100%;
  }

  :host ::ng-deep .ci-autocomplete__input {
    width: 100%;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    background: #f8f9fa;
  }

  .ci-autocomplete__item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .ci-autocomplete__item-label {
    font-size: 13px;
    font-weight: 500;
    color: #212529;
  }

  .ci-autocomplete__item-sub {
    font-size: 11px;
    color: #adb5bd;
  }

  /* ── Active bar ── */
  .ci-active-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 1rem;
    background: #e7f1ff;
    border-bottom: 1px solid #c9deff;
  }

  .ci-active-bar__icon {
    font-size: 12px;
    color: #0d6efd;
  }

  .ci-active-bar__label {
    font-size: 12px;
    font-weight: 500;
    color: #0d6efd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Divider ── */
  :host ::ng-deep .ci-divider.p-divider {
    margin: 0;
    padding: 0;
  }

  /* ── Nav ── */
  .ci-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0.35rem 0;
  }

  .ci-nav__empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 2rem 1rem;
    font-size: 13px;
    color: #adb5bd;
  }

  .ci-nav__group {
    margin-bottom: 0.15rem;
  }

  .ci-nav__group-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #adb5bd;
    padding: 8px 1rem 3px;
  }

  .ci-nav__group-icon {
    font-size: 10px;
  }

  :host ::ng-deep .ci-group-badge .p-badge {
    font-size: 9px;
    min-width: 1.1rem;
    height: 1.1rem;
    line-height: 1.1rem;
    background: #e9ecef;
    color: #6c757d;
    margin-left: auto;
  }

  .ci-nav__item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 1rem;
    font-size: 13px;
    color: #495057;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s, color 0.12s;
    line-height: 1.4;
    position: relative;
  }

  .ci-nav__item:hover {
    background: #f8f9fa;
    color: #212529;
  }

  .ci-nav__item--active {
    background: #e7f1ff;
    color: #0d6efd;
    border-left-color: #0d6efd;
    font-weight: 500;
  }

  .ci-nav__item-icon {
    font-size: 10px;
    opacity: 0.4;
    flex-shrink: 0;
  }

  .ci-nav__item--active .ci-nav__item-icon {
    opacity: 1;
    color: #0d6efd;
  }

  .ci-nav__item-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ci-nav__item-check {
    font-size: 11px;
    color: #0d6efd;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .ci-sidebar__footer {
    padding: 0.5rem 0.75rem;
    border-top: 1px solid #dee2e6;
  }

  :host ::ng-deep .ci-clear-btn {
    width: 100%;
    justify-content: center;
    font-size: 12px;
  }
</style>
